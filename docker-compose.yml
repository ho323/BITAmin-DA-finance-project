services:
  postgres:
    image: postgres:16
    container_name: bitamin-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bitamin_finance}
      POSTGRES_USER: ${POSTGRES_USER:-bitamin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bitamin}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bitamin} -d ${POSTGRES_DB:-bitamin_finance}"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: bitamin-airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-bitamin}:${POSTGRES_PASSWORD:-bitamin}@postgres:5432/${POSTGRES_DB:-bitamin_finance}
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-bitamin}:${POSTGRES_PASSWORD:-bitamin}@postgres:5432/${POSTGRES_DB:-bitamin_finance}
    command: >
      bash -c "airflow db migrate &&
               (airflow users create --username admin --password admin --firstname BITAmin --lastname Admin --role Admin --email admin@example.com || true)"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./data:/opt/project/data
      - ./reports:/opt/project/reports

  airflow-webserver:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: bitamin-airflow-webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-bitamin}:${POSTGRES_PASSWORD:-bitamin}@postgres:5432/${POSTGRES_DB:-bitamin_finance}
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-bitamin}:${POSTGRES_PASSWORD:-bitamin}@postgres:5432/${POSTGRES_DB:-bitamin_finance}
    command: airflow webserver
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./data:/opt/project/data
      - ./reports:/opt/project/reports
      - ./src:/opt/project/src

  airflow-scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: bitamin-airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-bitamin}:${POSTGRES_PASSWORD:-bitamin}@postgres:5432/${POSTGRES_DB:-bitamin_finance}
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-bitamin}:${POSTGRES_PASSWORD:-bitamin}@postgres:5432/${POSTGRES_DB:-bitamin_finance}
    command: airflow scheduler
    volumes:
      - ./dags:/opt/airflow/dags
      - ./data:/opt/project/data
      - ./reports:/opt/project/reports
      - ./src:/opt/project/src

  streamlit:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: bitamin-streamlit
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-bitamin}:${POSTGRES_PASSWORD:-bitamin}@postgres:5432/${POSTGRES_DB:-bitamin_finance}
    command: streamlit run app/streamlit_app.py --server.address=0.0.0.0 --server.port=8501
    ports:
      - "8501:8501"
    volumes:
      - ./app:/opt/project/app
      - ./src:/opt/project/src
      - ./data:/opt/project/data
      - ./reports:/opt/project/reports

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: bitamin-pgadmin
    profiles: ["tools"]
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"

volumes:
  postgres_data:
